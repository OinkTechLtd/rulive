<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IPTVPlayer App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0a0f1c 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(10, 15, 28, 0.95);
        }
        /* Header */
        .header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            flex-shrink: 0;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #00d2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.7rem;
            color: #888;
        }
        .playlist-selector {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 10px;
            border-radius: 40px;
        }
        .playlist-btn {
            background: none;
            border: none;
            color: #ccc;
            padding: 6px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            font-size: 0.9rem;
            will-change: background-color;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .playlist-btn.active {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 10px rgba(0,210,255,0.3);
        }
        .embed-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
            will-change: background-color;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .embed-btn:hover {
            background: #00d2ff;
            border-color: #00d2ff;
            color: #000;
        }
        /* Main Content */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: rgba(0,0,0,0.2);
        }
        /* Sidebar */
        .sidebar {
            width: 320px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }
        .search-box {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 14px;
        }
        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .channel-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 5px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 12px;
            will-change: background-color;
            -webkit-tap-highlight-color: transparent;
        }
        .channel-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .channel-item.active {
            background: #00d2ff20;
            border-left: 3px solid #00d2ff;
        }
        .channel-logo {
            width: 35px;
            height: 35px;
            background: #1e1e2e;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .channel-info {
            flex: 1;
            overflow: hidden;
        }
        .channel-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .channel-group {
            font-size: 11px;
            color: #aaa;
        }
        /* Video Player Area */
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            min-width: 0;
        }
        .player-wrapper {
            flex: 1;
            background: #000;
            position: relative;
            will-change: contents;
        }
        #player-container {
            width: 100%;
            height: 100%;
            background: #000;
        }
        .player-controls {
            background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            z-index: 5;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .current-info {
            flex: 1;
            min-width: 0;
        }
        .current-channel-name {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .current-group {
            font-size: 0.8rem;
            color: #aaa;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
            will-change: background-color;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .action-btn:hover {
            background: #00d2ff;
            color: #000;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1e2c;
            width: 90%;
            max-width: 700px;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #333;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .embed-code {
            background: #0a0c15;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            white-space: pre-wrap;
            margin: 15px 0;
            border: 1px solid #2a2e42;
            max-height: 200px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            user-select: all;
            -webkit-user-select: all;
        }
        .copy-btn {
            background: #00d2ff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            will-change: background-color;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .header { padding: 10px 15px; flex-wrap: wrap; gap: 10px; }
            .logo h1 { font-size: 1.2rem; }
            .logo p { font-size: 0.65rem; }
            .playlist-selector { order: 3; width: 100%; justify-content: center; }
            .embed-btn { padding: 6px 12px; font-size: 0.8rem; }
            .sidebar { 
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                width: 280px;
                z-index: 100;
                transition: left 0.3s ease;
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
                transform: translateZ(0);
                backface-visibility: hidden;
            }
            .sidebar.open { left: 0; }
            .main-content { gap: 0; }
            .video-area { width: 100%; }
            .player-controls { padding: 10px 15px; }
            .current-channel-name { font-size: 1rem; }
            .action-buttons { gap: 8px; }
            .action-btn { padding: 6px 12px; font-size: 12px; }
            .mobile-menu-btn {
                display: flex !important;
                background: none;
                border: none;
                color: white;
                font-size: 1.3rem;
                cursor: pointer;
                padding: 5px;
                margin-right: 10px;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
            }
            .modal-content { width: 95%; padding: 20px; }
            .embed-code { font-size: 11px; max-height: 150px; }
            .copy-btn { width: 100%; }
            .overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
            }
            .overlay.show { display: block; }
        }
        @media (min-width: 769px) {
            .mobile-menu-btn { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <div class="playlist-selector">
                <button class="playlist-btn active" data-playlist="livem3u">LIVEM3U</button>
                <button class="playlist-btn" data-playlist="zabava">WINK Zabava</button>
                <button class="playlist-btn" data-playlist="zabavaoff">WINK Zabava Project Offcial</button>
                <button class="playlist-btn" data-playlist="soyuzmult">Мультики ССР РФ</button>
                <button class="playlist-btn" data-playlist="soyuzmultoff">Мультики ССР РФ Offcial</button>
                <button class="playlist-btn" data-playlist="tvruss">Russia TV</button>
                <button class="playlist-btn" data-playlist="tvruss2">Russia TV Offcial</button>
            </div>
            <button class="embed-btn" id="openEmbedModalBtn"><i class="fas fa-code"></i> Embed Channel</button>
        </div>
        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Search channel...">
                </div>
                <div class="channels-list" id="channelsList">
                    <div style="text-align:center; padding:20px;">Loading channels...</div>
                </div>
            </div>
            <div class="video-area">
                <div class="player-wrapper">
                    <div id="player-container"></div>
                </div>
                <div class="player-controls">
                    <div class="current-info">
                        <div class="current-channel-name" id="currentChannelName">Select a channel</div>
                        <div class="current-group" id="currentGroup">––</div>
                    </div>
                    <div class="action-buttons">
                        <button class="action-btn" id="fullscreenBtn"><i class="fas fa-expand"></i> Fullscreen</button>
                        <button class="action-btn" id="copyStreamBtn"><i class="fas fa-link"></i> Copy Stream URL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Overlay для мобильного меню -->
    <div class="overlay" id="sidebarOverlay"></div>

    <!-- Модальное окно для Embed кода -->
    <div id="embedModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span><i class="fas fa-code"></i> Embed Channel</span>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div>Copy this code to your website:</div>
            <div class="embed-code" id="embedCodeText">Select a channel first</div>
            <button class="copy-btn" id="copyEmbedBtn"><i class="fas fa-copy"></i> Copy Code</button>
        </div>
    </div>

    <!-- Загрузка PlayerJS и HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="playerjs.js"></script>
    <script>
        // Конфигурация плейлистов
        const PLAYLISTS = {
            livem3u: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/data/playlist.m3u',
            zabavaoff: 'https://raw.githubusercontent.com/CrocoUser/zabava-project/refs/heads/main/zabava-full.m3u',
            zabava: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/zabava-full.m3u',
            soyuzmult: 'https://secure-272717.tatnet.app/iptvplay.tatnet.app/iptvlist.ru-mult (1).m3u',
            tvruss: 'https://secure-272717.tatnet.app/livem3u.tatnet.app/russ.m3u',
            tvruss2: 'https://secure-272717.tatnet.app/livetv.tatnet.app/russ.m3u',
            soyuzmultoff: 'https://secure-272717.tatnet.app/iptvplay.tatnet.app/iptvlist.ru-kids (1).m3u'

        };

        let currentPlaylistId = 'livem3u';
        let channels = [];
        let currentChannel = null;
        let playerInstance = null;
        let filterTimeout = null;

        // DOM элементы
        const channelsListEl = document.getElementById('channelsList');
        const searchInput = document.getElementById('searchInput');
        const currentChannelNameEl = document.getElementById('currentChannelName');
        const currentGroupEl = document.getElementById('currentGroup');
        const embedModal = document.getElementById('embedModal');
        const embedCodeText = document.getElementById('embedCodeText');

        // Инициализация плеера PlayerJS
        function initPlayer(videoUrl, channelName) {
            if (playerInstance) {
                // Если плеер уже существует, просто меняем источник
                try {
                    playerInstance.src(videoUrl);
                    playerInstance.play();
                } catch(e) {
                    console.warn("PlayerJS src update error", e);
                    recreatePlayer(videoUrl);
                }
            } else {
                recreatePlayer(videoUrl);
            }
        }

        function recreatePlayer(videoUrl) {
            const container = document.getElementById('player-container');
            if (playerInstance) {
                try { playerInstance.destroy(); } catch(e) {}
                container.innerHTML = '';
            }
            // Создаем новый плеер с поддержкой HLS
            playerInstance = new Playerjs({
                id: "player-container",
                file: videoUrl,
                autoplay: true,
                hls: 1,     // Включаем HLS поддержку
                poster: "",
                width: "100%",
                height: "100%",
                tracks: [],
                logo: {}
            });
        }

        // Парсинг M3U (универсальный)
        async function fetchAndParsePlaylist(url) {
            console.log('Fetching playlist:', url);
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.text();
                const lines = data.split(/\r?\n/);
                const parsed = [];
                let currentItem = null;
                let groupTitle = '';

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF')) {
                        // Извлечение названия канала и группы
                        let name = line.split(',')[1] || 'Unknown';
                        let matchGroup = line.match(/group-title="([^"]*)"/);
                        groupTitle = matchGroup ? matchGroup[1] : 'Main';
                        currentItem = { name: name.trim(), group: groupTitle, url: null };
                    } 
                    else if (currentItem && line && !line.startsWith('#')) {
                        currentItem.url = line;
                        if (currentItem.url) {
                            parsed.push({ ...currentItem });
                        }
                        currentItem = null;
                    }
                }
                // Фильтруем только каналы с URL
                const validChannels = parsed.filter(ch => ch.url && ch.url.startsWith('http'));
                console.log(`Parsed ${validChannels.length} channels from ${url}`);
                return validChannels;
            } catch (error) {
                console.error('Playlist load error:', error);
                return [];
            }
        }

        // Загрузка и отображение списка каналов
        async function loadPlaylist(playlistId) {
            channelsListEl.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-pulse"></i> Loading channels...</div>';
            const playlistUrl = PLAYLISTS[playlistId];
            if (!playlistUrl) return;
            
            const loadedChannels = await fetchAndParsePlaylist(playlistUrl);
            if (loadedChannels.length === 0) {
                channelsListEl.innerHTML = '<div style="text-align:center; padding:20px;">No channels found or playlist unavailable</div>';
                return;
            }
            channels = loadedChannels;
            renderChannelList(channels);
        }

        function renderChannelList(filteredChannels) {
            if (!filteredChannels.length) {
                channelsListEl.innerHTML = '<div style="text-align:center; padding:20px;">No channels match</div>';
                return;
            }
            channelsListEl.innerHTML = '';
            filteredChannels.forEach((channel, idx) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                if (currentChannel && currentChannel.url === channel.url) div.classList.add('active');
                div.innerHTML = `
                    <div class="channel-logo"><i class="fas fa-play-circle"></i></div>
                    <div class="channel-info">
                        <div class="channel-name">${escapeHtml(channel.name)}</div>
                        <div class="channel-group">${escapeHtml(channel.group)}</div>
                    </div>
                `;
                div.addEventListener('click', () => playChannel(channel));
                channelsListEl.appendChild(div);
            });
        }

        function playChannel(channel) {
            if (!channel || !channel.url) return;
            currentChannel = channel;
            currentChannelNameEl.textContent = channel.name;
            currentGroupEl.textContent = channel.group;
            initPlayer(channel.url, channel.name);
            renderChannelList(channels.filter(c => 
                c.name.toLowerCase().includes(searchInput.value.toLowerCase()) ||
                c.group.toLowerCase().includes(searchInput.value.toLowerCase())
            ));
        }

        // Поиск с debounce
        searchInput.addEventListener('input', (e) => {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                const query = e.target.value.toLowerCase();
                const filtered = channels.filter(ch => 
                    ch.name.toLowerCase().includes(query) || 
                    ch.group.toLowerCase().includes(query)
                );
                renderChannelList(filtered);
            }, 300);
        });

        // Переключение плейлистов
        document.querySelectorAll('.playlist-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                document.querySelectorAll('.playlist-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlaylistId = btn.dataset.playlist;
                currentChannel = null;
                currentChannelNameEl.textContent = 'Select a channel';
                currentGroupEl.textContent = '––';
                if (playerInstance) {
                    try { playerInstance.destroy(); } catch(e) {}
                    playerInstance = null;
                }
                await loadPlaylist(currentPlaylistId);
            });
        });

        // Embed функционал
        document.getElementById('openEmbedModalBtn').addEventListener('click', () => {
            if (!currentChannel) {
                alert('Please select a channel first');
                return;
            }
            const currentDomain = window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '');
            const embedHtml = `<iframe src="${currentDomain}/embed.html?url=${encodeURIComponent(currentChannel.url)}&title=${encodeURIComponent(currentChannel.name)}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>`;
            embedCodeText.textContent = embedHtml;
            embedModal.style.display = 'flex';
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            embedModal.style.display = 'none';
        });
        window.addEventListener('click', (e) => {
            if (e.target === embedModal) embedModal.style.display = 'none';
        });
        document.getElementById('copyEmbedBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(embedCodeText.textContent);
            alert('Embed code copied!');
        });
        document.getElementById('copyStreamBtn').addEventListener('click', () => {
            if (currentChannel) {
                navigator.clipboard.writeText(currentChannel.url);
                alert('Stream URL copied!');
            } else {
                alert('No channel selected');
            }
        });
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            const container = document.getElementById('player-container');
            if (container.requestFullscreen) container.requestFullscreen();
        });

        // Мобильное меню
        const sidebar = document.getElementById('sidebar');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        
        function toggleSidebar() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        }
        
        mobileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSidebar();
        });
        
        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });
        
        // Закрытие сайдбара при клике на канал
        channelsListEl.addEventListener('click', () => {
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('show');
            }
        });

        // Оптимизация: отключение рендеринга неактивных элементов
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (window.innerWidth > 768) {
                    sidebar.classList.remove('open');
                    sidebarOverlay.classList.remove('show');
                }
            }, 200);
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Загрузка начального плейлиста
        loadPlaylist('livem3u');
    </script>
</body>
</html>
